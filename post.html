<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post - My Personal Blog</title>
  <link rel="stylesheet" href="style.css" />
  <script src="markdown-reader.js"></script>
</head>
<body>
  <!-- Animated clouds -->
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="cloud cloud4"></div>
  <div class="cloud cloud5"></div>
  <div class="cloud cloud6"></div>
  
  <!-- Sun -->
  <div class="sun"></div>
  
  <div class="layout">
    <!-- Main Content -->
    <main class="content">
      <div class="intro">
        <div class="avatar" aria-label="Profile photo">
          <img src="\images\DSC01154.jpg" alt="Antti's profile photo" style="width: 110%; height: 110%; object-fit: cover; border-radius: 50%; transform: translate(-5%, -5%); border: 3px solid #00008b;">
        </div>
        <p>Hello! I'm Antti. I live in Finland. This is my blog. 🌼☕</p>
      </div>
      
      <div class="content-box menu-box">
        <nav>
          <ul class="menu">
            <li><a href="index.html">Home</a></li>
          </ul>
        </nav>
      </div>

      <div class="content-box">
        <div id="blog-post-content">
          <p>Loading post...</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Load individual blog post
    async function loadBlogPost() {
      const urlParams = new URLSearchParams(window.location.search);
      const fileName = urlParams.get('file');
      
      if (!fileName) {
        document.getElementById('blog-post-content').innerHTML = '<p>No post specified.</p>';
        return;
      }

      try {
        const response = await fetch(fileName);
        if (response.ok) {
          const markdown = await response.text();
          const html = markdownToHtml(markdown);
          document.getElementById('blog-post-content').innerHTML = html;
        } else {
          document.getElementById('blog-post-content').innerHTML = '<p>Post not found.</p>';
        }
      } catch (error) {
        document.getElementById('blog-post-content').innerHTML = '<p>Error loading post.</p>';
      }
    }

    // Load post when page loads
    document.addEventListener('DOMContentLoaded', loadBlogPost);
  </script>
</body>
</html>
